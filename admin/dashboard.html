<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurovia - Admin Dashboard</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.min.css">
    
    <script>
        // CRITICAL SECURITY: Run this script BEFORE parsing the body
        // If no token exists, immediately redirect to login page.
        const token = localStorage.getItem('admin_token');
        if (!token) {
            window.location.replace("login.html");
        }
    </script>
    
    <style>
        body {
            background-color: var(--bg-light);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
        }
        .admin-header {
            background: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .admin-header img {
            height: 40px;
        }
        .logout-btn {
            background: #fff;
            border: 1px solid #ddd;
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.3s;
        }
        .logout-btn:hover {
            background: #f8f9fa;
        }
        .admin-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .welcome-section {
            margin-bottom: 2rem;
        }
        .welcome-section h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .stat-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border-left: 4px solid var(--gold-primary);
        }
        .stat-card h3 {
            color: #666;
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }
        .stat-card .value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-dark);
        }
        
        #loading {
            text-align: center;
            padding: 4rem;
            font-size: 1.2rem;
            color: #666;
        }
        
        .dashboard-content {
            display: none;
        }
    </style>
</head>
<body>

    <header class="admin-header">
        <img src="../assets/front/assets/images/aurovia-main-logo.svg" alt="Aurovia Logo" onerror="this.src='https://auroviaproductions.com/front/assets/images/aurovia-main-logo.svg'">
        <button class="logout-btn" onclick="logout()">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
    </header>

    <div class="admin-container">
        <div id="loading">
            <i class="fa-solid fa-circle-notch fa-spin"></i> Authenticating...
        </div>

        <div id="dashboard-content" class="dashboard-content">
            <div class="welcome-section">
                <h1 id="welcome-msg">Welcome back!</h1>
                <p>Here is an overview of your Aurovia website activity.</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Visitors</h3>
                    <div class="value" id="val-visitors">--</div>
                </div>
                <div class="stat-card">
                    <h3>New Inquiries</h3>
                    <div class="value" id="val-inquiries">--</div>
                </div>
            </div>
            
            <div style="background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.03);">
                <h3>Manage Website Content</h3>
                <p style="color: #666; margin-top: 1rem;">Select a module to manage your dynamic data.</p>
                <!-- Add admin features here in the future -->
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "http://127.0.0.1:8000"; // Change in production

        async function fetchSecureData() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/admin/stats`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.status === 401) {
                    // Token expired or invalid
                    logout();
                    return;
                }

                if (response.ok) {
                    const data = await response.json();
                    
                    // Populate UI
                    document.getElementById('welcome-msg').textContent = data.message;
                    document.getElementById('val-visitors').textContent = data.visitors;
                    document.getElementById('val-inquiries').textContent = data.inquiries;
                    
                    // Show dashboard
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('dashboard-content').style.display = 'block';
                }
            } catch (err) {
                console.error("Backend unreachable", err);
                document.getElementById('loading').innerHTML = `
                    <div style="color: #d9534f;">
                        <i class="fa-solid fa-triangle-exclamation"></i> 
                        Unable to connect to the backend server.
                    </div>
                `;
            }
        }

        function logout() {
            localStorage.removeItem('admin_token');
            window.location.replace("login.html");
        }

        // Initialize dashboard data
        fetchSecureData();
    </script>
</body>
</html>
